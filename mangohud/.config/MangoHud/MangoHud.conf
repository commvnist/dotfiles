## ~/.config/MangoHud/MangoHud.conf

legacy_layout=0
hud_compact
horizontal

# Prevent the background from stretching across the screen.
# Tune this if text gets clipped.
width=520

# Position / size
position=top-left
offset_x=12
offset_y=12
font_size=16
round_corners=6
background_alpha=0
alpha=1.0
text_outline

# Core GPU metrics
gpu_stats
gpu_power
vram
gpu_text=GPU

# Core CPU metrics
cpu_stats
cpu_power
ram
cpu_text=CPU

# FPS basics
fps
frametime
fps_text=FPS

# Toggle HUD
toggle_hud=Shift_R+F12
